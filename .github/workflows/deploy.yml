name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_SSH_KEY_B64: ${{ secrets.DEPLOY_SSH_KEY_B64 }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Python files compile
        run: python -m compileall app.py bot_messages.py tools.py

      - name: Build release archive
        run: |
          python - <<'PY'
          from pathlib import Path
          import tarfile

          root = Path.cwd()
          archive_path = root / "deadline-bot-release.tar.gz"
          excludes = {".git", ".github", ".env", ".venv", "__pycache__", "deadlines.json", archive_path.name}

          with tarfile.open(archive_path, "w:gz") as tar:
              for path in root.rglob("*"):
                  rel = path.relative_to(root)
                  if any(part in excludes for part in rel.parts):
                      continue
                  if path.is_file():
                      tar.add(path, arcname=rel.as_posix())
          PY

      - name: Configure SSH
        if: ${{ env.DEPLOY_HOST != '' && env.DEPLOY_USER != '' && (env.DEPLOY_SSH_KEY != '' || env.DEPLOY_SSH_KEY_B64 != '') }}
        run: |
          install -m 700 -d ~/.ssh
          if [[ -n "${DEPLOY_SSH_KEY_B64}" ]]; then
            printf '%s' "$DEPLOY_SSH_KEY_B64" | tr -d '\r\n ' | base64 -d > ~/.ssh/id_ed25519
          else
            printf '%s' "$DEPLOY_SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
            printf '\n' >> ~/.ssh/id_ed25519
          fi
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null
          if [[ -n "${DEPLOY_KNOWN_HOSTS}" ]]; then
            printf '%s' "$DEPLOY_KNOWN_HOSTS" | tr -d '\r' > ~/.ssh/known_hosts
            printf '\n' >> ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts
          fi

      - name: Upload release archive
        if: ${{ env.DEPLOY_HOST != '' && env.DEPLOY_USER != '' && (env.DEPLOY_SSH_KEY != '' || env.DEPLOY_SSH_KEY_B64 != '') }}
        run: |
          scp -i ~/.ssh/id_ed25519 -P "${DEPLOY_PORT:-22}" deadline-bot-release.tar.gz "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/deadline-bot-release.tar.gz"

      - name: Secrets missing notice
        if: ${{ env.DEPLOY_HOST == '' || env.DEPLOY_USER == '' || (env.DEPLOY_SSH_KEY == '' && env.DEPLOY_SSH_KEY_B64 == '') }}
        run: |
          echo "GitHub Actions secrets for deployment are not configured yet."
          echo "Add DEPLOY_HOST, DEPLOY_USER and either DEPLOY_SSH_KEY or DEPLOY_SSH_KEY_B64, then rerun this workflow."

      - name: Run remote deploy
        if: ${{ env.DEPLOY_HOST != '' && env.DEPLOY_USER != '' && (env.DEPLOY_SSH_KEY != '' || env.DEPLOY_SSH_KEY_B64 != '') }}
        env:
          APP_DIR: /opt/deadline-bot/app
          VENV_DIR: /opt/deadline-bot/.venv
          SERVICE_NAME: deadline-bot
          RELEASE_ARCHIVE: /tmp/deadline-bot-release.tar.gz
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "APP_DIR='${APP_DIR}' VENV_DIR='${VENV_DIR}' SERVICE_NAME='${SERVICE_NAME}' RELEASE_ARCHIVE='${RELEASE_ARCHIVE}' bash -s" \
            < deploy/deploy.sh
